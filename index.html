<center>
<h1>EXERCISE 1 — STUDENT MARKS COUNTER </h1>
<h2>Marks</h2>
<h1 id="marks">50</h1>
<button id="addMarks">Add Bonus Marks</button>
<button id="deductMarks">Deduct Marks</button>

</center>
<script>
let MarksH1 = document.querySelector("#marks")
let plusMarks= document.querySelector("#addMarks")
let minusMarks = document.querySelector("#deductMarks")
console.log(MarksH1)
console.log(plusMarks)
console.log(minusMarks)
let Marks = Number(MarksH1.innerHTML)
let bonusMarks = () => {
    Marks+=5
    MarksH1.innerHTML=Marks
}
let deductMarks = () => {
   Marks-=5
   MarksH1.innerHTML=Marks


}
plusMarks.addEventListener("click",bonusMarks)
minusMarks.addEventListener("click",deductMarks)
</script>

<center>
<h1>EXERCISE 2 — AGE COUNTER</h1>
<h2>Age</h2>
<h1 id="Age">18</h1>
<button id="ageUp">Birthday</button>
<button id="ageDown">Go Back One Year</button>

</center>
<script>

let ageH1 = document.querySelector("#Age")
let plusAge = document.querySelector("#ageUp")
let minusAge = document.querySelector("#ageDown")
console.log(ageH1)
console.log(plusAge)
console.log(minusAge)
let age = ageH1.innerHTML
let ageUp = () => {
    age++
    ageH1.innerHTML=age
}
let ageDown = () => {
    age--
    ageH1.innerHTML=age
}
plusAge.addEventListener("click",ageUp)
minusAge.addEventListener("click",ageDown)

</script>
<br>

 bulbH2.innerHTML = "BULB is on"
